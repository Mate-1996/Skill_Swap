<div class="page-container">
  <div class="page-header">
    <h1>My Postings</h1>
    <a routerLink="/post-job" class="btn btn-primary">Post New Job</a>
  </div>

  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
  <div *ngIf="jobs.length === 0 && !errorMessage" class="empty">
    You haven't posted any jobs yet.
  </div>

  <div class="job-list">
    <div *ngFor="let job of jobs" class="job-card">
      <div class="card-content">
        <div class="card-top">
          <h3>{{ job.title }}</h3>
          <span class="badge">{{ job.category }}</span>
          <span class="status-badge status-{{ job.status }}">{{ job.status }}</span>
        </div>
        <p class="description">{{ job.description }}</p>
        <p class="budget">Budget: ${{ job.budget }}</p>
      </div>
      <div class="card-actions">
        <a [routerLink]="['/jobs', job.id]" class="btn btn-primary">View</a>
      </div>
    </div>
  </div>
</div>
