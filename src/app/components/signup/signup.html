<h2>Sign Up</h2>
<form (ngSubmit)="submit()">
  <label>
    Name
    <input [(ngModel)]="name" name="name" type="text" />
  </label>

  <label>
    Username
    <input [(ngModel)]="username" name="username" type="text" />
  </label>

  <label>
    Email
    <input [(ngModel)]="email" name="email" type="email" />
  </label>

  <label>
    Password
    <input [(ngModel)]="password" name="password" type="password" />
  </label>

  <label>
    Bio
    <input [(ngModel)]="bio" name="bio" type="text" />
  </label>
  
  <label>
    Skills <span class="hint">(comma separated, e.g. Angular, Node.js)</span>
    <input [(ngModel)]="skillsInput" name="skillsInput" type="text" placeholder="Angular, Node.js, Design" />
  </label>

  <div *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </div>

  <div *ngIf="suggestedUsername" class="suggestion">
    Username taken. Suggested: <strong>{{ suggestedUsername }}</strong>
    <button type="button" (click)="useSuggested()">Use this</button>
  </div>

  <button type="submit">Create Account</button>

  <p>Already have an account? <a routerLink="/login">Login</a></p>
</form>
